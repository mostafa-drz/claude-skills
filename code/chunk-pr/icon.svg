<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <title>Vessel brick — rounded square whole, six tiled bricks of varying sizes inside</title>
  <defs>
    <clipPath id="vessel-brick-clip">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
    </clipPath>
  </defs>
  <g clip-path="url(#vessel-brick-clip)" stroke="none">
    <rect x="3" y="3" width="10" height="5" fill="currentColor"/>
    <rect x="13" y="3" width="8" height="5" fill="currentColor" fill-opacity="0.4"/>
    <rect x="3" y="8" width="6" height="6" fill="currentColor" fill-opacity="0.65"/>
    <rect x="9" y="8" width="12" height="6" fill="currentColor" fill-opacity="0.18"/>
    <rect x="3" y="14" width="8" height="7" fill="currentColor" fill-opacity="0.3"/>
    <rect x="11" y="14" width="10" height="7" fill="currentColor" fill-opacity="0.52"/>
  </g>
  <rect x="3" y="3" width="18" height="18" rx="2"/>
</svg>
